<VirtualHost *:${PORT}>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php index.html
    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>
    <Directory /var/www/html>
        AllowOverride None
        Require all denied
    </Directory>
    <Directory /var/www/html/public>
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
